<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torren Relay</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">

    <div class="popup-header">
      <span class="popup-title">Torren Relay</span>
      <span class="popup-version" data-testid="popup-version">v0.1.0</span>
    </div>

    <div class="popup-section-title">Account</div>

    <div class="popup-auth-gate-note" id="popup-auth-gate-note" data-testid="popup-auth-gate-note">Free access — sign in with your email to activate Torren Relay</div>

    <div class="popup-auth-step" id="popup-auth-step-email" data-testid="popup-auth-step-email">
      <div class="popup-auth-row">
        <input type="email" id="popup-auth-email" data-testid="popup-auth-email"
               class="popup-auth-input" placeholder="you@example.com" autocomplete="email">
        <button type="button" id="popup-auth-send-code" data-testid="popup-auth-send-code"
                class="popup-auth-btn">Send code</button>
      </div>
    </div>

    <div class="popup-auth-step" id="popup-auth-step-code" data-testid="popup-auth-step-code" hidden>
      <label class="popup-auth-field-label" for="popup-auth-code">Code from email</label>
      <div class="popup-auth-row">
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="10"
               id="popup-auth-code" data-testid="popup-auth-code"
               class="popup-auth-input popup-auth-input--code" placeholder="Digits only"
               autocomplete="one-time-code">
        <button type="button" id="popup-auth-verify" data-testid="popup-auth-verify"
                class="popup-auth-btn">Verify</button>
      </div>
      <div class="popup-auth-links">
        <button type="button" id="popup-auth-resend" data-testid="popup-auth-resend"
                class="popup-auth-link">Resend code</button>
        <button type="button" id="popup-auth-change-email" data-testid="popup-auth-change-email"
                class="popup-auth-link">Use different email</button>
      </div>
    </div>

    <div class="popup-auth-step" id="popup-auth-step-loggedin" data-testid="popup-auth-step-loggedin" hidden>
      <div class="popup-auth-row popup-auth-row--loggedin">
        <span class="popup-auth-email-display" id="popup-auth-email-display"
              data-testid="popup-auth-email-display"></span>
        <button type="button" id="popup-auth-logout" data-testid="popup-auth-logout"
                class="popup-auth-link">Log out</button>
      </div>
    </div>

    <div class="popup-auth-status" id="popup-auth-status" data-testid="popup-auth-status"></div>

    <div class="popup-features" id="popup-features" data-testid="popup-features" hidden>

    <div class="popup-divider"></div>

    <div class="popup-section-title">Display &amp; Alerts</div>

    <div class="popup-row">
      <label class="popup-label" for="popup-night-mode">Night Mode</label>
      <label class="toggle-switch">
        <input type="checkbox" id="popup-night-mode" data-testid="popup-night-mode">
        <span class="toggle-track"></span>
      </label>
    </div>

    <div class="popup-row">
      <label class="popup-label" for="popup-tab-alert">Tab Alert</label>
      <label class="toggle-switch">
        <input type="checkbox" id="popup-tab-alert" data-testid="popup-tab-alert">
        <span class="toggle-track"></span>
      </label>
    </div>

    <div class="popup-row">
      <label class="popup-label" for="popup-auto-open">Auto-Open Top Load</label>
      <label class="toggle-switch">
        <input type="checkbox" id="popup-auto-open" data-testid="popup-auto-open">
        <span class="toggle-track"></span>
      </label>
    </div>

    <div class="popup-sound">
      <div class="popup-sound-head">Sound</div>
      <div class="popup-sound-row">
        <span class="popup-sound-ic" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"></path><line x1="22" y1="9" x2="16" y2="15"></line><line x1="16" y1="9" x2="22" y2="15"></line></svg>
        </span>
        <input type="range" id="popup-volume" data-testid="popup-volume" min="0" max="100" step="1" value="70">
        <span class="popup-sound-ic" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"></path><path d="M15.5 8.5a5 5 0 0 1 0 7"></path><path d="M18.5 5.5a9 9 0 0 1 0 13"></path></svg>
        </span>
      </div>
      <div class="popup-sound-select-row">
        <select id="popup-sound-select" data-testid="popup-sound-select" class="popup-select">
          <option value="default">Default chime</option>
          <option value="soft">Soft ping</option>
          <option value="sharp">Sharp beep</option>
          <option value="bell">Bell</option>
          <option value="deep">Deep bong</option>
          <option value="high">High tick</option>
          <option value="click">Click</option>
          <option value="ding">Bright ding</option>
          <option value="sonar">Sonar ping</option>
          <option value="low">Low buzz</option>
          <option value="blip">Retro blip</option>
          <option value="wood">Wood block</option>
          <option value="double">Double ping</option>
          <option value="notify">Notify</option>
          <option value="drop">Drop</option>
          <option value="triple">Triple blip</option>
          <option value="alarm">Alarm siren</option>
          <option value="fanfare">Fanfare</option>
          <option value="sparkle">Sparkle</option>
          <option value="sweep_up">Rising sweep</option>
          <option value="sweep_down">Falling sweep</option>
          <option value="chord">Major chord</option>
          <option value="dial">Dial tone</option>
          <option value="burst">Pulse burst</option>
          <option value="error">Error tone</option>
        </select>
        <button type="button" id="popup-sound-replay" data-testid="popup-sound-replay"
                class="popup-sound-replay" aria-label="Preview sound">&#9654;</button>
      </div>
    </div>

    <div class="popup-row">
      <label class="popup-label" for="popup-surge">Price Surge Alert</label>
      <label class="toggle-switch">
        <input type="checkbox" id="popup-surge" data-testid="popup-surge">
        <span class="toggle-track"></span>
      </label>
    </div>
    <div class="popup-row popup-row--sub">
      <label class="popup-label" for="popup-surge-threshold">Threshold</label>
      <div class="popup-amount">
        <span class="popup-amount-sign">$</span>
        <input type="number" id="popup-surge-threshold" data-testid="popup-surge-threshold" min="0" step="5" value="50" class="popup-amount-input">
      </div>
    </div>

    <div class="popup-divider"></div>

    <div class="popup-section-title">Load Board Filters</div>

    <div class="popup-tag-block">
      <div class="popup-tag-filter">
        <label class="popup-tag-label" for="popup-hide-promoted">Promoted</label>
        <label class="toggle-switch toggle-switch--sm">
          <input type="checkbox" id="popup-hide-promoted" data-testid="popup-hide-promoted">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="popup-tag-filter">
        <label class="popup-tag-label" for="popup-hide-starting-soon">Starting soon</label>
        <label class="toggle-switch toggle-switch--sm">
          <input type="checkbox" id="popup-hide-starting-soon" data-testid="popup-hide-starting-soon">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="popup-tag-filter">
        <label class="popup-tag-label" for="popup-hide-trailer-ready">Trailer ready</label>
        <label class="toggle-switch toggle-switch--sm">
          <input type="checkbox" id="popup-hide-trailer-ready" data-testid="popup-hide-trailer-ready">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="popup-tag-filter">
        <label class="popup-tag-label" for="popup-hide-past-book">Booked before</label>
        <label class="toggle-switch toggle-switch--sm">
          <input type="checkbox" id="popup-hide-past-book" data-testid="popup-hide-past-book">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>

    <div class="popup-row">
      <label class="popup-label popup-label--wide" for="popup-hide-similar">Hide Similar Matches</label>
      <label class="toggle-switch">
        <input type="checkbox" id="popup-hide-similar" data-testid="popup-hide-similar">
        <span class="toggle-track"></span>
      </label>
    </div>

    <div class="popup-divider"></div>

    <div class="popup-section-title">Booking</div>

    <div class="popup-row">
      <label class="popup-label" for="popup-fast-book">Fast Book</label>
      <label class="toggle-switch">
        <input type="checkbox" id="popup-fast-book" data-testid="popup-fast-book">
        <span class="toggle-track"></span>
      </label>
    </div>

    <div class="popup-divider"></div>

    <div class="popup-footer">
      <button type="button" id="popup-reset" data-testid="popup-reset" class="popup-reset">Reset to defaults</button>
    </div>

    </div>

  </div>
  <script src="../utils/constants.js"></script>
  <script src="../utils/logger.js"></script>
  <script src="../utils/storage.js"></script>
  <script src="../utils/soundDefs.js"></script>
  <script src="../vendor/supabase.min.js"></script>
  <script src="../utils/supabaseConfig.js"></script>
  <script src="popup.js"></script>
</body>
</html>
